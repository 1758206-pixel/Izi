function tr(k){
  return I18N[currentLang]?.[k] ?? I18N.en[k] ?? k;
}

function money(n, min = 0, max = 2){
  return new Intl.NumberFormat(currentLocale, {
    style:'currency',
    currency:'USD',
    minimumFractionDigits:min,
    maximumFractionDigits:max
  }).format(Number(n || 0));
}

function f(n){ return money(Math.abs(Number(n || 0)), 0, 2); }
function f2(n){ return money(Math.abs(Number(n || 0)), 2, 2); }
function monthlySuffix(){ return tr('monthlySuffix'); }
function annualSuffix(){ return tr('annualSuffix'); }

function parisTime(){
  return new Intl.DateTimeFormat(currentLocale, {
    timeZone:'Europe/Paris',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit',
    day:'2-digit',
    month:'2-digit',
    year:'numeric'
  }).format(new Date());
}

function unlock(){
  const inp = document.getElementById('lock-pw');
  const val = inp.value;
  const user = PASSWORDS[val];
  if(user){
    document.getElementById('lock').style.display='none';
    document.getElementById('loading').style.display='flex';
    loadData(user);
  } else {
    inp.classList.add('err');
    inp.value='';
    setTimeout(()=>inp.classList.remove('err'),400);
  }
}

function toggleEye(){
  eyeOn = !eyeOn;
  document.getElementById('lock-pw').type = eyeOn ? 'text' : 'password';
  document.getElementById('eye-btn').textContent = eyeOn ? '🙈' : '👁';
}

function normalizeSource(src){
  const map = {
    none:'company_us',
    company:'company_us',
    company_us:'company_us',
    malvin:'malvin_personal',
    malvin_personal:'malvin_personal',
    amaury:'amaury_personal',
    amaury_personal:'amaury_personal',
    french:'french_co',
    french_co:'french_co'
  };
  return map[src] || 'company_us';
}

function getMonthlyAmt(e){
  return e.amtMonthly !== undefined ? Number(e.amtMonthly) : Number(e.amt || 0);
}

function getPaySource(e){
  if (e.paySource) return normalizeSource(e.paySource);
  if (e.advancedBy) return normalizeSource(e.advancedBy);

  if (e.type === 'loan') {
    if (e.entity === 'fr') return 'french_co';
    if (e.paidBy === 'malvin') return 'malvin_personal';
    if (e.paidBy === 'amaury') return 'amaury_personal';
    if (e.entity === 'us') return 'malvin_personal';
  }

  if (e.entity === 'fr') return 'french_co';
  if (e.paidBy === 'malvin') return 'malvin_personal';
  if (e.paidBy === 'amaury') return 'amaury_personal';
  return 'company_us';
}

function sourceLabel(src){
  src = normalizeSource(src);
  return {
    company_us:tr('sourceCompanyLong'),
    malvin_personal:tr('sourceMalvinLong'),
    amaury_personal:tr('sourceAmauryLong'),
    french_co:tr('sourceFrenchLong')
  }[src] || tr('sourceCompanyLong');
}

function sourceShort(src){
  src = normalizeSource(src);
  return {
    company_us:tr('sourceCompany'),
    malvin_personal:tr('sourceMalvin'),
    amaury_personal:tr('sourceAmaury'),
    french_co:tr('sourceFrench')
  }[src] || tr('sourceCompany');
}

function deriveSourceFromUI(type, entity, payer){
  if (type === 'loan') {
    if (payer === 'malvin') return 'malvin_personal';
    if (payer === 'amaury') return 'amaury_personal';
    if (payer === 'none' && entity === 'fr') return 'french_co';
    return null;
  }

  if (payer === 'malvin') return 'malvin_personal';
  if (payer === 'amaury') return 'amaury_personal';
  if (payer === 'none' && entity === 'fr') return 'french_co';
  return 'company_us';
}

function setUiFromSource(src, editMode){
  src = normalizeSource(src);
  let ent = 'us';
  let payer = 'none';

  if (src === 'french_co') {
    ent = 'fr';
    payer = 'none';
  } else if (src === 'malvin_personal') {
    ent = 'us';
    payer = 'malvin';
  } else if (src === 'amaury_personal') {
    ent = 'us';
    payer = 'amaury';
  } else {
    ent = 'us';
    payer = 'none';
  }

  if (editMode) {
    editSetEntity(ent);
    editSetPayer(payer);
  } else {
    setEntity(ent);
    setPayer(payer);
  }
}

async function loadData(user){
  let statusCode='unknown';
  try {
    const r = await fetch(SUPABASE_API+'?id=eq.1&select=log',{
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY
      }
    });
    statusCode = r.status;
    if(!r.ok) throw new Error('HTTP '+r.status+' — '+r.statusText);
    const d = await r.json();
    log = Array.isArray(d[0]?.log) ? d[0].log : [];
  } catch(e){
    log = [];
    showDebug('Erreur: ' + e.message + '<br>HTTP: ' + statusCode + '<br>onLine: ' + navigator.onLine);
    return;
  }

  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('inp-date').valueAsDate = new Date();

  ensureV2DomPatch();
  setAuthor(user, true);
  setTT('rev');
  setUiFromSource('company_us', false);
  renderDash();
}

async function saveData(){
  setSS('saving');
  try{
    const r = await fetch(SUPABASE_API+'?id=eq.1',{
      method:'PATCH',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer ' + SUPABASE_KEY,
        'Prefer':'return=representation'
      },
      body:JSON.stringify({log:log})
    });
    const body = await r.json();
    if(!r.ok || !body.length) throw new Error('HTTP ' + r.status + ' — rows updated: ' + (body.length || 0));
    setSS('saved');
  }catch(e){
    setSS('error');
    showToast('⚠ Save failed: ' + e.message, true);
  }
}

function compute(){
  let rev = 0;
  let expUS = 0;
  let subUS = 0;

  let revC = 0;
  let expC = 0;

  let loanByMalvin = 0;
  let loanByAmauryPersonal = 0;
  let loanByFrenchCo = 0;

  let expPaidByMalvin = 0;
  let expPaidByAmauryPersonal = 0;
  let expPaidByFrenchCo = 0;

  let subPaidByMalvin = 0;
  let subPaidByAmauryPersonal = 0;
  let subPaidByFrenchCo = 0;

  let dueToMalvinGross = 0;
  let dueToAmauryPersonalGross = 0;
  let dueToFrenchCoGross = 0;

  log.filter(e => !e.superseded).forEach(e => {
    if (e.type === 'rev') {
      rev += Number(e.amt || 0);
      revC++;
      return;
    }

    if (e.type === 'exp') {
      const amt = Number(e.amt || 0);
      const src = getPaySource(e);
      expUS += amt;
      expC++;

      if (src === 'malvin_personal') {
        expPaidByMalvin += amt;
        dueToMalvinGross += amt;
      } else if (src === 'amaury_personal') {
        expPaidByAmauryPersonal += amt;
        dueToAmauryPersonalGross += amt;
      } else if (src === 'french_co') {
        expPaidByFrenchCo += amt;
        dueToFrenchCoGross += amt;
      }
      return;
    }

    if (e.type === 'sub') {
      const m = getMonthlyAmt(e);
      const src = getPaySource(e);
      subUS += m;

      if (src === 'malvin_personal') {
        subPaidByMalvin += m;
        dueToMalvinGross += m;
      } else if (src === 'amaury_personal') {
        subPaidByAmauryPersonal += m;
        dueToAmauryPersonalGross += m;
      } else if (src === 'french_co') {
        subPaidByFrenchCo += m;
        dueToFrenchCoGross += m;
      }
      return;
    }

    if (e.type === 'loan') {
      const amt = Number(e.amt || 0);
      const src = getPaySource(e);

      if (src === 'malvin_personal') {
        loanByMalvin += amt;
        dueToMalvinGross += amt;
      } else if (src === 'amaury_personal') {
        loanByAmauryPersonal += amt;
        dueToAmauryPersonalGross += amt;
      } else if (src === 'french_co') {
        loanByFrenchCo += amt;
        dueToFrenchCoGross += amt;
      }
    }
  });

  const netBefore = rev - expUS - subUS;
  const totalDueGross = dueToMalvinGross + dueToAmauryPersonalGross + dueToFrenchCoGross;
  const priorityRepay = Math.min(totalDueGross, Math.max(0, netBefore));

  const repayToMalvin = totalDueGross > 0 ? priorityRepay * (dueToMalvinGross / totalDueGross) : 0;
  const repayToAmauryPersonal = totalDueGross > 0 ? priorityRepay * (dueToAmauryPersonalGross / totalDueGross) : 0;
  const repayToFrenchCo = totalDueGross > 0 ? priorityRepay * (dueToFrenchCoGross / totalDueGross) : 0;

  const outstandingMalvin = Math.max(0, dueToMalvinGross - repayToMalvin);
  const outstandingAmauryPersonal = Math.max(0, dueToAmauryPersonalGross - repayToAmauryPersonal);
  const outstandingFrenchCo = Math.max(0, dueToFrenchCoGross - repayToFrenchCo);

  const dist = Math.max(0, netBefore - priorityRepay);

  const malvinShare = dist * 0.5;
  const amauryShare = dist * 0.5;

  const malvinFinal = malvinShare + repayToMalvin;
  const amauryPersonalFinal = amauryShare + repayToAmauryPersonal;
  const frenchCoFinal = repayToFrenchCo;
  const amaurySideFinal = amauryShare + repayToAmauryPersonal + repayToFrenchCo;

  return {
    rev,
    expUS,
    subUS,
    netBefore,
    revC,
    expC,
    loanByMalvin,
    loanByAmauryPersonal,
    loanByFrenchCo,
    expPaidByMalvin,
    expPaidByAmauryPersonal,
    expPaidByFrenchCo,
    subPaidByMalvin,
    subPaidByAmauryPersonal,
    subPaidByFrenchCo,
    dueToMalvinGross,
    dueToAmauryPersonalGross,
    dueToFrenchCoGross,
    priorityRepay,
    repayToMalvin,
    repayToAmauryPersonal,
    repayToFrenchCo,
    outstandingMalvin,
    outstandingAmauryPersonal,
    outstandingFrenchCo,
    totalDueGross,
    loansOwed: outstandingMalvin + outstandingAmauryPersonal + outstandingFrenchCo,
    dist,
    malvinShare,
    amauryShare,
    malvinFinal,
    amauryPersonalFinal,
    frenchCoFinal,
    amaurySideFinal
  };
}

async function addTx() {
  const desc = document.getElementById('inp-desc').value.trim();
  const amt = parseFloat(document.getElementById('inp-amt').value);
  const date = document.getElementById('inp-date').value;

  if (!desc || isNaN(amt) || amt <= 0) {
    showToast(tr('fillRequired'), true);
    return;
  }

  const src = txType === 'rev' ? 'company_us' : deriveSourceFromUI(txType, txEntity, subPayer);
  if (txType === 'loan' && !src) {
    showToast(tr('invalidAdvance'), true);
    return;
  }

  const e = {
    id: Date.now(),
    type: txType,
    entity: 'us',
    economicEntity: 'us',
    paySource: src,
    uiEntity: txEntity,
    paidBy: subPayer,
    desc,
    amt,
    cur: 'USD',
    date,
    author,
    timestamp: parisTime(),
    tsIso: new Date().toISOString()
  };

  if (txType === 'sub') {
    e.cadence = subCadence;
    e.amtMonthly = subCadence === 'annual' ? +(amt / 12).toFixed(2) : amt;
  }

  if (txType === 'loan') {
    e.advancedBy = src;
  }

  log.unshift(e);
  saveData();

  fetch(GOOGLE_SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    cache: 'no-cache',
    body: JSON.stringify(e)
  });

  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-amt').value = '';
  document.getElementById('inp-date').valueAsDate = new Date();
  setUiFromSource('company_us', false);
  setCadence('monthly');

  showToast(tr('savedCloudSheet'));
  switchTab('dash', null);
  if (document.querySelectorAll('.tab')[0]) document.querySelectorAll('.tab')[0].classList.add('active');
}

  document.getElementById('k-exp').textContent = f(c.expUS + c.subUS);

  document.getElementById('k-loan').textContent = f(c.loansOwed);

  document.getElementById('wf-net1').textContent = f(c.netBefore);

  document.getElementById('ph-amaury').textContent = f(c.amaurySideFinal);

  const db = document.getElementById('amaury-debt-banner');
  if (db) {
    const hasOutstanding = c.outstandingAmauryPersonal > 0 || c.outstandingFrenchCo > 0 || c.outstandingMalvin > 0;
    if (hasOutstanding) {
      db.innerHTML = `
        <div class="debt-banner">
          💡 <strong>${tr('debtBannerTitle')}</strong><br>
          ${tr('debtMalvin')}: ${f2(c.outstandingMalvin)} ·
          ${tr('debtAmaury')}: ${f2(c.outstandingAmauryPersonal)} ·

        </div>
      `;
      db.style.display = 'block';
    } else {
      db.style.display = 'none';
    }
  }

  const subs = log.filter(e => e.type === 'sub' && !e.superseded);
  const tot = subs.reduce((s,e) => s + getMonthlyAmt(e), 0);
  document.getElementById('dash-sub-total').textContent = `${f2(tot)}${monthlySuffix()}`;

  document.getElementById('dash-sub-list').innerHTML = subs.length ? subs.map(e => {
    const m = getMonthlyAmt(e);
    const da = e.cadence === 'annual' ? `${f2(e.amt)}${annualSuffix()}` : `${f2(e.amt)}${monthlySuffix()}`;

    return `<div class="subitem">

        <span class="subim">${src} · ${e.date}</span>

      </div>
    </div>`;
  }).join('') : `<div style="padding:10px 0;font-size:12px;color:var(--dim);text-align:center;">${tr('noSubs')}</div>`;
}

        ${tr('debtFrench')}: <strong>${f2(c.outstandingFrenchCo)}</strong>
      </div>
    `;
    dl.style.display = 'block';
  }

  const loans = log.filter(e => !e.superseded && (e.type === 'loan' || (e.type === 'exp' && getPaySource(e) !== 'company_us')));
  document.getElementById('loan-entries').innerHTML =
    loans.length ? loans.map(itemHTML).join('') : `<div class="empty"><div class="ei">✅</div>${tr('noLoans')}</div>`;

  const sp = log.filter(e => !e.superseded && e.type === 'sub' && getPaySource(e) !== 'company_us');
  document.getElementById('sub-personal-entries').innerHTML =
    sp.length ? sp.map(itemHTML).join('') : `<div class="empty"><div class="ei">✅</div>${tr('noPersonalSubs')}</div>`;
}

function renderHist(){
  const ft = document.getElementById('fl-type').value;
  const fa = document.getElementById('fl-auth').value;
  const filtered = log.filter(e => (ft==='all' || e.type===ft) && (fa==='all' || e.author===fa));
  document.getElementById('hist-list').innerHTML =
    filtered.length ? filtered.map(itemHTML).join('') : `<div class="empty"><div class="ei">🔍</div>${tr('noEntries')}</div>`;
}

function renderCo(){
  const c = compute();

  document.getElementById('co-us-rev').textContent = f(c.rev);
  document.getElementById('co-us-exp').textContent = f(c.expUS);
  document.getElementById('co-us-sub').textContent = `${f(c.subUS)}${monthlySuffix()}`;
  document.getElementById('co-us-loan').textContent = f(c.dueToMalvinGross);
  document.getElementById('co-us-subadv').textContent = f(c.outstandingMalvin);
  document.getElementById('co-us-share').textContent = f(c.malvinShare);
  document.getElementById('co-us-final').textContent = f(c.malvinFinal);

  if (document.getElementById('co-ap-exp')) {
    document.getElementById('co-ap-exp').textContent = f(c.expPaidByAmauryPersonal);
    document.getElementById('co-ap-sub').textContent = `${f(c.subPaidByAmauryPersonal)}${monthlySuffix()}`;
    document.getElementById('co-ap-loan').textContent = f(c.loanByAmauryPersonal);
    document.getElementById('co-ap-total').textContent = f(c.outstandingAmauryPersonal);
    document.getElementById('co-ap-share').textContent = f(c.amauryShare);
    document.getElementById('co-ap-final').textContent = f(c.amauryPersonalFinal);
  }

  document.getElementById('co-fr-exp').textContent = f(c.expPaidByFrenchCo);
  document.getElementById('co-fr-sub').textContent = `${f(c.subPaidByFrenchCo)}${monthlySuffix()}`;
  document.getElementById('co-fr-loan').textContent = f(c.loanByFrenchCo);
  document.getElementById('co-fr-subadv').textContent = f(c.outstandingFrenchCo);
  document.getElementById('co-fr-share').textContent = f(0);
  document.getElementById('co-fr-final').textContent = f(c.frenchCoFinal);
}

function itemHTML(e){
  const src = getPaySource(e);
  const isSub = e.type === 'sub';

  const icMap = {
    rev:'inc',
    exp:src==='company_us' ? 'expu' : 'expf',
    loan:'loan',
    sub:'sub'
  };

  const emMap = {
    rev:'💰',
    exp:src==='company_us' ? '💸' : '🤝',
    loan:'💜',
    sub:'🔄'
  };

  const acl = e.type==='rev' ? 'g' : e.type==='loan' ? 'v' : e.type==='sub' ? 'o' : 'p';
  const apfx = e.type==='rev' ? '+' : '−';
  const csfx = isSub ? (e.cadence==='annual' ? annualSuffix() : monthlySuffix()) : '';

  let tags = '';

  if (e.type === 'rev') {
    tags += `<span class="htag g">${tr('tagUsRevenue')}</span>`;
  } else if (e.type === 'loan') {
    tags += `<span class="htag v">${tr('tagAdvance')}</span><span class="htag p">${sourceShort(src)}</span>`;
  } else if (e.type === 'sub') {
    tags += `<span class="htag b">${tr('tagUsSubscription')}</span><span class="htag ${e.cadence==='annual' ? 'y' : 'o'}">${e.cadence==='annual' ? tr('annual') : tr('monthly')}</span><span class="htag p">${sourceShort(src)}</span>`;
  } else if (e.type === 'exp') {
    tags += `<span class="htag b">${tr('tagUsExpense')}</span><span class="htag p">${sourceShort(src)}</span>`;
  }

  tags += e.author==='malvin'
    ? '<span class="htag" style="background:rgba(0,255,136,.1);color:var(--green)">Malvin</span>'
    : '<span class="htag" style="background:rgba(255,34,102,.1);color:var(--pink)">Amaury</span>';

  if (e.isEdit) tags += `<span class="htag y">${tr('editedTag')}</span>`;

  let extra = '';

  if (isSub && e.cadence === 'annual') {
    extra += `<span style="font-size:10px;color:var(--dim);display:block;margin-top:2px;font-family:var(--fm)">≈${f2(getMonthlyAmt(e))}${monthlySuffix()}</span>`;
  }

  if (e.isEdit) {
    extra += `<div class="edit-audit">✏️ <strong>${tr('editedTag')}</strong> · ${tr('wasLabel')}: ${e.prevDesc} · ${f2(Math.abs(e.prevAmt))} on ${e.prevDate}<br>${tr('reasonLabel')}: <em>${e.editReason}</em></div>`;
  }

  if (e.superseded) {
    extra += `<div class="sup-note">${tr('supersededBy')}</div>`;
  }

  const editBtn = (!e.superseded) ? `<button class="edit-btn" onclick="openEdit(${e.id})">${tr('editButton')}</button>` : '';

  return `<div class="hitem${e.superseded ? ' sup' : ''}">
    <div class="hicon ${icMap[e.type] || 'inc'}">${emMap[e.type] || '💰'}</div>
    <div class="hinfo">
      <div class="hdesc">${e.desc}</div>
      <div class="hmeta">${e.date} · ${e.timestamp || ''} ${tags}</div>
      ${extra}${editBtn}
    </div>
    <div class="hamt ${acl}">${apfx}${f2(Math.abs(Number(e.amt || 0)))}${csfx}</div>
  </div>`;
}

function showToast(msg, err){
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.style.background = err ? 'var(--pink)' : 'var(--green)';
  t.style.color = '#000';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function openEdit(id){
  const e = log.find(x => x.id === id);
  if(!e) return;

  editId = id;
  eTT = e.type;
  eCad = e.cadence || 'monthly';

  document.getElementById('edit-desc').value = e.desc;
  document.getElementById('edit-amt').value = e.amt;
  document.getElementById('edit-date').value = e.date;
  document.getElementById('edit-reason').value = '';

  editSetTT(eTT);
  setUiFromSource(getPaySource(e), true);
  editSetCadence(eCad);

  document.getElementById('edit-modal').classList.add('open');
}

function closeEdit(){
  document.getElementById('edit-modal').classList.remove('open');
  editId = null;
}

function editSetTT(t){
  eTT = t;

  ['rev','exp','loan','sub'].forEach(k => {
    const el = document.getElementById('ett-' + k);
    if (!el) return;
    el.className = 'ttbtn' + (k===t ? (t==='rev' ? ' ag' : t==='exp' ? ' ap' : t==='loan' ? ' av' : ' ao') : '');
  });

  const entityRow = document.getElementById('edit-entity-row');
  const cadenceRow = document.getElementById('edit-cadence-row');
  const payerRow = document.getElementById('edit-payer-row');
  const entityLabel = document.getElementById('edit-entity-label');
  const payerLabel = document.querySelector('#edit-payer-row .flabel');
  const amtLabel = document.getElementById('edit-amt-label');

  if (t === 'rev') {
    if (entityRow) entityRow.style.display = 'none';
    if (cadenceRow) cadenceRow.style.display = 'none';
    if (payerRow) payerRow.style.display = 'none';
    if (amtLabel) amtLabel.textContent = tr('amountLabel');
  }

  if (t === 'exp') {
    if (entityRow) entityRow.style.display = 'block';
    if (cadenceRow) cadenceRow.style.display = 'none';
    if (payerRow) payerRow.style.display = 'block';
    if (entityLabel) entityLabel.textContent = tr('labelIfCompanyPaid');
    if (payerLabel) payerLabel.textContent = tr('labelPaidVia');
    if (amtLabel) amtLabel.textContent = tr('amountLabel');
  }

  if (t === 'sub') {
    if (entityRow) entityRow.style.display = 'block';
    if (cadenceRow) cadenceRow.style.display = 'block';
    if (payerRow) payerRow.style.display = 'block';
    if (entityLabel) entityLabel.textContent = tr('labelIfCompanyPaid');
    if (payerLabel) payerLabel.textContent = tr('labelPaidVia');
    if (amtLabel) amtLabel.textContent = tr('amountLabelSub');
  }

  if (t === 'loan') {
    if (entityRow) entityRow.style.display = 'block';
    if (cadenceRow) cadenceRow.style.display = 'none';
    if (payerRow) payerRow.style.display = 'block';
    if (entityLabel) entityLabel.textContent = tr('labelFrenchCoAdvance');
    if (payerLabel) payerLabel.textContent = tr('labelAdvancedBy');
    if (amtLabel) amtLabel.textContent = tr('amountLabel');
  }
}

function editSetEntity(e){
  eEnt = e;
  const us = document.getElementById('eet-us');
  const fr = document.getElementById('eet-fr');
  if (us) us.className = 'etbtn' + (e==='us' ? ' ag' : '');
  if (fr) fr.className = 'etbtn' + (e==='fr' ? ' ap' : '');
}

function editSetCadence(c){
  eCad = c;
  const mo = document.getElementById('esc-monthly');
  const an = document.getElementById('esc-annual');
  if (mo) mo.className = 'sctbtn' + (c==='monthly' ? ' ao' : '');
  if (an) an.className = 'sctbtn' + (c==='annual' ? ' ao' : '');
}

function editSetPayer(p){
  ePay = p;
  const none = document.getElementById('epp-none');
  const malvin = document.getElementById('epp-malvin');
  const amaury = document.getElementById('epp-amaury');
  if (none) none.className = 'etbtn' + (p==='none' ? ' ag' : '');
  if (malvin) malvin.className = 'etbtn' + (p==='malvin' ? ' ag' : '');
  if (amaury) amaury.className = 'etbtn' + (p==='amaury' ? ' ap' : '');
}

function saveEdit(){
  const desc = document.getElementById('edit-desc').value.trim();
  const amt = parseFloat(document.getElementById('edit-amt').value);
  const date = document.getElementById('edit-date').value;
  const reason = document.getElementById('edit-reason').value.trim() || tr('noReason');

  if(!desc || isNaN(amt) || amt<=0){
    showToast(tr('editFill'), true);
    return;
  }
  if(editId===null) return;

  const orig = log.find(x => x.id === editId);
  if(!orig) return;

  const src = eTT === 'rev' ? 'company_us' : deriveSourceFromUI(eTT, eEnt, ePay);
  if (eTT === 'loan' && !src) {
    showToast(tr('invalidAdvance'), true);
    return;
  }

  orig.superseded = true;
  orig.supersededBy = Date.now();

  const newE = {
    id: Date.now(),
    type: eTT,
    entity: 'us',
    economicEntity: 'us',
    paySource: src,
    uiEntity: eEnt,
    paidBy: ePay,
    desc,
    amt,
    cur:'USD',
    date,
    author,
    timestamp:parisTime(),
    tsIso:new Date().toISOString(),
    isEdit:true,
    editOf:editId,
    editReason:reason,
    prevDesc:orig.desc,
    prevAmt:orig.amt,
    prevDate:orig.date
  };

  if(eTT === 'sub'){
    newE.cadence = eCad;
    newE.amtMonthly = eCad === 'annual' ? +(amt/12).toFixed(2) : amt;
  }

  if(eTT === 'loan'){
    newE.advancedBy = src;
  }

  log.unshift(newE);
  saveData();
  closeEdit();
  showToast(tr('editSaved'));
  renderDash();
}
  </script>
